services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - /app/.next
    environment:
      # next build 等を `docker compose run` する際は production を使う。dev は next が既定で development にする。
      WATCHPACK_POLLING: "true"
    stdin_open: true
    tty: true

volumes:
  app_node_modules:
